apiVersion: v1
kind: ConfigMap
metadata:
  name: firefly
  namespace: psql
  labels:
    ongy.net/psql-db: "true"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: psql-client-secret
spec:
  isCA: false
  duration: 8760h # 1 years
  commonName: firefly
  secretName: psql-client-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: psql-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io