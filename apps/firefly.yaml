  - chart: firefly-iii
    repoURL: https://firefly-iii.github.io/kubernetes/
    targetRevision: 1.9.12
    helm:
      valuesObject:
        podSecurityContext:
          fsGroup: 33
          fsGroupChangePolicy: "OnRootMismatch"
        extraVolumes:
        - name: psql-tls-secrets
          secret:
            defaultMode: 416
            secretName: psql-client-secret
        extraVolumeMounts:
        - mountPath: "/psql-tls-secrets"
          name: psql-tls-secrets
        persistence:
          storageClassName: "rook-cephfs"
        config:
          env:
            "DB_CONNECTION": "pgsql"
            "DB_DATABASE": "firefly"
            "DB_HOST": psql.psql
            "DB_PORT": "5432"
            "DB_USERNAME": "firefly"
            
            "PGSQL_SSL_MODE": "verify-full"
            "PGSQL_SSL_CERT": "/psql-tls-secrets/..data/tls.crt"
            "PGSQL_SSL_KEY": "/psql-tls-secrets/..data/tls.key"
            "PGSQL_SSL_ROOT_CERT": "/psql-tls-secrets/..data/ca.crt"

            "DEFAULT_LANGUAGE": "en_US"
            "DEFAULT_LOCALE": "equal"
            "TRUSTED_PROXIES": "**"
            "TZ": "Europe/Berlin"	

            AUTHENTICATION_GUARD: remote_user_guard
            AUTHENTICATION_GUARD_HEADER: X-Forwarded-User
            AUTHENTICATION_GUARD_EMAIL: X-Forwarded-Email
  - repoURL: ssh://git@git.local.ongy.net:7022/ongy/argocd.git
    path: firefly-iii
    targetRevision: main
  - repoURL: https://git.local.ongy.net/ongy/argocd.git
    path: secret-value
    targetRevision: main
    helm:
      valuesObject:
        secretName: firefly-oauth-cookie
  destination:
    server: "https://kubernetes.default.svc"
    namespace: firefly
  syncPolicy:
    syncOptions:
      - PruneLast=true
      - CreateNamespace=true
      - ServerSideApply=true


